rotate:
  name: Rotate now
  description: Manually trigger a rotation of the Frame art.

wake:
  name: Wake frame
  description: Send Wake-on-LAN and enable art mode.

standby:
  name: Standby
  description: Disable art mode (panel off, but API stays responsive).

set_rotation_time:
  name: Set rotation time
  description: Change the daily rotation time. Takes effect on the next scheduled rotation (the coordinator reloads the daily timer).
  fields:
    time:
      name: Time
      description: New daily rotation time in HH:MM (24-hour format).
      required: true
      example: "08:30"
      selector:
        time: {}
